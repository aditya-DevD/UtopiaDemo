<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utopia Website</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "neon-purple": "#c724fd",
            "neon-blue": "#24d4fd",
            "neon-pink": "#fd24b1",
            "dark-charcoal": "#0f0f1a",
            "dark-navy": "#15152a"
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            heading: ["Poppins", "Inter", "system-ui", "sans-serif"]
          },
          animation: {
            "pulse-glow": "pulse-glow 2s infinite",
            float: "float 6s ease-in-out infinite",
            glow: "glow 2s ease-in-out infinite alternate"
          },
          keyframes: {
            "pulse-glow": {
              "0%,100%": { boxShadow: "0 0 5px #c724fd" },
              "50%": { boxShadow: "0 0 20px #c724fd, 0 0 30px #c724fd" }
            },
            float: {
              "0%,100%": { transform: "translateY(0)" },
              "50%": { transform: "translateY(-20px)" }
            },
            glow: {
              from: { boxShadow: "0 0 10px #24d4fd, 0 0 20px #24d4fd" },
              to: { boxShadow: "0 0 20px #24d4fd, 0 0 40px #24d4fd" }
            }
          }
        }
      }
    }
  </script>

</head>

<body class="bg-dark-charcoal text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
